spring:
  application:
    name: payment-service

  config:
    import: optional:file:.env[.properties]

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

stripe:
  secret-key: ${STRIPE.SECRET.KEY}
  publishable-key: ${STRIPE.PUBLISHABLE.KEY}
  webhook-secret: ${STRIPE.WEBHOOK.SECRET}

jwt:
  secret-key: ${JWT.TOKEN.SECRET.KEY}
  expiration-seconds: 86400

admin:
  name: ${ADMIN.NAME}
  midname: ${ADMIN.MIDNAME}
  surname: ${ADMIN.SURNAME}
  email: ${ADMIN.EMAIL}
  password: ${ADMIN.PASSWORD}

billing:
  max-retry-count: 3
  basic-amount: 9.99
  premium-amount: 19.99
  default-currency: USD